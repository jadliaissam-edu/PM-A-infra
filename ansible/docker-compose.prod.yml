version: '3.8'

networks:
  public_net:
    driver: overlay
  backend_net:
    driver: overlay
    internal: true

volumes:
  postgres_data:
  redis_data:
  prometheus_data:
  grafana_data:

secrets:
  db_password:
    external: true
  django_secret_key:
    external: true

services:
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    networks:
      - public_net
    deploy:
      placement:
        constraints:
          - node.role == manager
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
      restart_policy:
        condition: on-failure

  frontend:
    image: nginx:alpine # MOCK IMAGE for testing
    networks:
      - public_net
    deploy:
      replicas: 2
      placement:
        constraints:
          - node.labels.tier == app
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
      restart_policy:
        condition: on-failure

  django_api:
    image: nginx:alpine # MOCK IMAGE for testing
    networks:
      - public_net
      - backend_net
    secrets:
      - db_password
      - django_secret_key
    environment:
      - DB_PASSWORD=/run/secrets/db_password
      - SECRET_KEY=/run/secrets/django_secret_key
    deploy:
      replicas: 2
      placement:
        constraints:
          - node.labels.tier == app
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
      restart_policy:
        condition: on-failure
    healthcheck:
      test: ["CMD", "echo", "mock_healthy"] # MOCK HEALTHCHECK
      interval: 30s
      timeout: 10s
      retries: 3

  fastapi_ai:
    image: nginx:alpine # MOCK IMAGE for testing
    networks:
      - public_net
      - backend_net
    deploy:
      replicas: 2
      placement:
        constraints:
          - node.labels.tier == app
      resources:
        limits:
          cpus: '2.0'
          memory: 4G
      restart_policy:
        condition: on-failure
    healthcheck:
      test: ["CMD", "echo", "mock_healthy"] # MOCK HEALTHCHECK
      interval: 30s
      timeout: 10s
      retries: 3

  celery_worker:
    image: alpine # MOCK IMAGE for testing
    command: sleep infinity
    networks:
      - backend_net
    secrets:
      - db_password
    environment:
      - DB_PASSWORD=/run/secrets/db_password
    deploy:
      replicas: 2
      placement:
        constraints:
          - node.labels.tier == app
      resources:
        limits:
          cpus: '1.0'
          memory: 2G
      restart_policy:
        condition: on-failure

  postgres:
    image: pgvector/pgvector:pg16 
    networks:
      - backend_net
    volumes:
      - postgres_data:/var/lib/postgresql/data
    secrets:
      - db_password
    environment:
      POSTGRES_PASSWORD_FILE: /run/secrets/db_password
    deploy:
      placement:
        constraints:
          - node.labels.tier == data
      resources:
        limits:
          cpus: '2.0'
          memory: 4G
      restart_policy:
        condition: on-failure
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 30s
      timeout: 10s
      retries: 3

  redis:
    image: redis:alpine
    networks:
      - backend_net
    volumes:
      - redis_data:/data
    deploy:
      placement:
        constraints:
          - node.labels.tier == data
      resources:
        limits:
          cpus: '1.0'
          memory: 2G
      restart_policy:
        condition: on-failure
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3

  prometheus:
    image: prom/prometheus:latest
    networks:
      - backend_net
    volumes:
      - prometheus_data:/prometheus
    deploy:
      placement:
        constraints:
          - node.role == manager
      resources:
        limits:
          cpus: '0.5'
          memory: 1G

  grafana:
    image: grafana/grafana:latest
    networks:
      - public_net
      - backend_net
    volumes:
      - grafana_data:/var/lib/grafana
    deploy:
      placement:
        constraints:
          - node.role == manager
      resources:
        limits:
          cpus: '0.5'
          memory: 1G