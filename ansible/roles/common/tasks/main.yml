---
# ── System packages & updates ────────────────────────────
- name: Wait for apt lock to be released
  shell: while fuser /var/lib/apt/lists/lock >/dev/null 2>&1 || fuser /var/lib/dpkg/lock-frontend >/dev/null 2>&1; do sleep 10; done
  changed_when: false
  tags: common

- name: Update apt cache and upgrade packages
  apt:
    update_cache: yes
    upgrade: dist
  retries: 5
  delay: 30
  ignore_errors: yes
  tags: common

- name: Install essential packages
  apt:
    name:
      - fail2ban
      - unattended-upgrades
      - apt-listchanges
      - curl
      - wget
      - gnupg2
      - ca-certificates
      - software-properties-common
      - python3-pip
      - python3-venv
      - ufw
      - rsync
    state: present
  tags: common

# ── User setup ───────────────────────────────────────────
- name: Ensure deploy user exists
  user:
    name: deploy
    groups: sudo
    shell: /bin/bash
    append: yes
  tags: common

- name: Allow deploy user passwordless sudo
  copy:
    dest: /etc/sudoers.d/deploy
    content: "deploy ALL=(ALL) NOPASSWD:ALL\n"
    mode: '0440'
    validate: '/usr/sbin/visudo -csf %s'
  tags: common

- name: Create .ssh directory for deploy user
  file:
    path: /home/deploy/.ssh
    state: directory
    owner: deploy
    group: deploy
    mode: '0700'
  tags: common

- name: Copy root's SSH key to deploy user
  copy:
    src: /root/.ssh/authorized_keys
    dest: /home/deploy/.ssh/authorized_keys
    owner: deploy
    group: deploy
    mode: '0600'
    remote_src: yes
  tags: common

# ── SSH Hardening (per spec: keys only, port 2222, no root) ──
- name: Hardening SSH
  lineinfile:
    path: /etc/ssh/sshd_config
    regexp: "{{ item.regexp }}"
    line: "{{ item.line }}"
    state: present
    validate: "sshd -t -f %s"
  loop:
    - { regexp: '^#?PermitRootLogin', line: 'PermitRootLogin no' }
    - { regexp: '^#?PasswordAuthentication', line: 'PasswordAuthentication no' }
    - { regexp: '^#?PubkeyAuthentication', line: 'PubkeyAuthentication yes' }
    - { regexp: '^#?Port', line: 'Port 2222' }
    - { regexp: '^#?MaxAuthTries', line: 'MaxAuthTries 3' }
    - { regexp: '^#?AllowUsers', line: 'AllowUsers deploy' }
    - { regexp: '^#?X11Forwarding', line: 'X11Forwarding no' }
    - { regexp: '^#?PermitEmptyPasswords', line: 'PermitEmptyPasswords no' }
    - { regexp: '^#?ChallengeResponseAuthentication', line: 'ChallengeResponseAuthentication no' }
  notify: Restart SSH
  tags: [common, ssh]

# ── Fail2Ban (per spec: auto-ban suspicious IPs) ─────────
- name: Configure fail2ban defaults
  copy:
    dest: /etc/fail2ban/jail.local
    content: |
      [DEFAULT]
      bantime  = 3600
      findtime = 600
      maxretry = 3
      banaction = iptables-multiport

      [sshd]
      enabled  = true
      port     = 2222
      filter   = sshd
      logpath  = /var/log/auth.log
      maxretry = 3

      [nginx-http-auth]
      enabled  = true
      filter   = nginx-http-auth
      logpath  = /var/log/nginx/error.log
      maxretry = 5
  notify: Restart fail2ban
  tags: [common, fail2ban]

- name: Ensure fail2ban is running
  service:
    name: fail2ban
    state: started
    enabled: yes
  tags: [common, fail2ban]

# ── UFW Firewall (per spec: only 80, 443, SSH 2222) ─────
- name: Configure UFW defaults
  ufw:
    policy: deny
    direction: incoming
  tags: [common, firewall]

- name: Allow SSH on port 2222
  ufw:
    rule: allow
    port: "2222"
    proto: tcp
  tags: [common, firewall]

- name: Allow HTTP
  ufw:
    rule: allow
    port: "80"
    proto: tcp
  tags: [common, firewall]

- name: Allow HTTPS
  ufw:
    rule: allow
    port: "443"
    proto: tcp
  tags: [common, firewall]

- name: Allow Docker Swarm port
  ufw:
    rule: allow
    port: "2377"
    proto: tcp
  tags: [common, firewall]

- name: Enable UFW
  ufw:
    state: enabled
  tags: [common, firewall]

# ── Unattended upgrades ──────────────────────────────────
- name: Configure unattended-upgrades
  copy:
    dest: /etc/apt/apt.conf.d/50unattended-upgrades
    content: |
      Unattended-Upgrade::Allowed-Origins {
          "${distro_id}:${distro_codename}-security";
          "${distro_id}:${distro_codename}-updates";
      };
      Unattended-Upgrade::AutoFixInterruptedDpkg "true";
      Unattended-Upgrade::Remove-Unused-Dependencies "true";
      Unattended-Upgrade::Automatic-Reboot "true";
      Unattended-Upgrade::Automatic-Reboot-Time "03:00";
  tags: common

- name: Enable unattended-upgrades
  copy:
    dest: /etc/apt/apt.conf.d/20auto-upgrades
    content: |
      APT::Periodic::Update-Package-Lists "1";
      APT::Periodic::Unattended-Upgrade "1";
      APT::Periodic::Download-Upgradeable-Packages "1";
      APT::Periodic::AutocleanInterval "7";
  tags: common
